{% extends "layout.html" %}
{% block container %}
<div class="py-8">
    <div class="flex justify-between mb-4">
        <h1 class="text-2xl font-bold">Lista de Usuarios</h1>
        <a href="/usuarios/nuevo" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Nuevo Usuario</a>
    </div>
    
    <div class="overflow-x-auto">
        <table class="min-w-full bg-white border">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="px-4 py-2">Matrícula</th>
                    <th class="px-4 py-2">Nombre</th>
                    <th class="px-4 py-2">Apellidos</th>
                    <th class="px-4 py-2">Correo</th>
                    <th class="px-4 py-2">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr class="border-b">
                    <td class="px-4 py-2">{{ usuario.matricula }}</td>
                    <td class="px-4 py-2">{{ usuario.nombre }}</td>
                    <td class="px-4 py-2">{{ usuario.apellidos }}</td>
                    <td class="px-4 py-2">{{ usuario.correo }}</td>
                    <td class="px-4 py-2">
                        <a href="/usuarios/editar/{{ usuario.matricula }}" class="bg-yellow-500 text-white px-2 py-1 rounded">Editar</a>
                        <a href="/usuarios/eliminar/{{ usuario.matricula }}" class="bg-red-500 text-white px-2 py-1 rounded" onclick="return confirm('¿Estás seguro?')">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
